{% extends "base.html" %}

{% block title %}Settings{% endblock %}

{% block header_title %}Proxmoxer Settings{% endblock %}

{% block content %}
<div class="max-w-4xl mx-auto">
    <!-- Settings Card -->
    <div class="bg-white rounded-lg shadow-lg p-8 mb-6">
        <h2 class="text-3xl font-bold text-gray-800 mb-6">Plugin Settings</h2>

        <form class="space-y-6">
            <!-- Server Configuration -->
            <div>
                <h3 class="text-xl font-semibold text-gray-700 mb-4">Server Configuration</h3>

                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">
                            Server URL
                        </label>
                        <input type="text"
                               class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                               placeholder="https://proxmox.example.com">
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">
                                Username
                            </label>
                            <input type="text"
                                   class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                                   placeholder="admin">
                        </div>

                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">
                                Password
                            </label>
                            <input type="password"
                                   class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                                   placeholder="••••••••">
                        </div>
                    </div>
                </div>
            </div>

            <!-- General Settings -->
            <div>
                <h3 class="text-xl font-semibold text-gray-700 mb-4">General Settings</h3>

                <div class="space-y-4">
                    <div class="flex items-center">
                        <input type="checkbox"
                               id="auto_start"
                               class="w-4 h-4 text-blue-600 border-gray-300 rounded focus:ring-blue-500">
                        <label for="auto_start" class="ml-2 text-sm text-gray-700">
                            Auto-start VMs on challenge access
                        </label>
                    </div>

                    <div class="flex items-center">
                        <input type="checkbox"
                               id="auto_stop"
                               class="w-4 h-4 text-blue-600 border-gray-300 rounded focus:ring-blue-500">
                        <label for="auto_stop" class="ml-2 text-sm text-gray-700">
                            Auto-stop VMs after timeout
                        </label>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">
                            VM Timeout (minutes)
                        </label>
                        <input type="number"
                               class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                               placeholder="30"
                               value="30">
                    </div>
                </div>
            </div>

            <!-- Action Buttons -->
            <div class="flex space-x-4 pt-6 border-t">
                <button type="submit"
                        class="bg-blue-500 hover:bg-blue-700 text-white font-bold py-2 px-6 rounded-lg transition duration-300">
                    Save Settings
                </button>
                <button type="button"
                        class="bg-gray-500 hover:bg-gray-700 text-white font-bold py-2 px-6 rounded-lg transition duration-300">
                    Test Connection
                </button>
                <button type="reset"
                        class="bg-gray-300 hover:bg-gray-400 text-gray-700 font-bold py-2 px-6 rounded-lg transition duration-300">
                    Reset
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
    // Form validation and handling
    document.querySelector('form').addEventListener('submit', function(e) {
        e.preventDefault();
        alert('Settings saved! (Demo)');
    });
</script>
{% endblock %}
